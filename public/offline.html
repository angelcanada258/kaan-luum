<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f6e56">
    <title>Sin conexión | Kaan Luum</title>
    <style>
      :root { color-scheme: light; font-family: Arial, sans-serif; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        color: #1a1a18;
        background:
          radial-gradient(circle at 50% 30%, rgba(29,158,117,.16), transparent 30%),
          #f5f5f3;
      }
      main {
        width: min(420px, 100%);
        padding: 34px;
        border: .5px solid rgba(0,0,0,.12);
        border-radius: 22px;
        background: white;
        box-shadow: 0 22px 55px rgba(15,110,86,.12);
        text-align: center;
      }
      .mark {
        width: 76px;
        height: 76px;
        display: grid;
        place-items: center;
        margin: 0 auto 22px;
        border: 10px solid #1d9e75;
        border-radius: 50%;
        color: #0f6e56;
        box-shadow: inset 0 0 0 8px #bce9dc;
        font: 700 20px Georgia, serif;
      }
      h1 { margin: 0 0 10px; font: 700 30px/1.1 Georgia, serif; }
      p { margin: 0 0 24px; color: #67665f; line-height: 1.55; }
      button {
        width: 100%;
        padding: 13px 18px;
        border: 0;
        border-radius: 12px;
        color: white;
        background: #1d9e75;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">KL</div>
      <h1>Sin conexión</h1>
      <p>La interfaz está disponible, pero necesitas internet para consultar la base de datos o registrar brazaletes.</p>
      <button type="button" onclick="location.reload()">Volver a intentar</button>
    </main>
  </body>
</html>
